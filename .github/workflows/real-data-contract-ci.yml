name: Real Data Contract CI

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/real-data-contract-ci.yml
      - scripts/compute_rll_real_pipeline.py
      - scripts/fetch_real_sources.py
      - scripts/import_raw_json_dataset.py
      - scripts/run_structure_d_robust_fit_matrix.py
      - tools/docs_inventory.py
      - tools/validate_real_cosmology_inputs_yml.py
      - tools/validate_real_dataset_variance_registry.py
      - data/real/**
      - docs/real_data/**
      - requirements.txt
      - tests/**
  push:
    branches: [main]
    paths:
      - .github/workflows/real-data-contract-ci.yml
      - scripts/compute_rll_real_pipeline.py
      - scripts/fetch_real_sources.py
      - scripts/import_raw_json_dataset.py
      - scripts/run_structure_d_robust_fit_matrix.py
      - tools/docs_inventory.py
      - tools/validate_real_cosmology_inputs_yml.py
      - tools/validate_real_dataset_variance_registry.py
      - data/real/**
      - docs/real_data/**
      - requirements.txt
      - tests/**
  workflow_dispatch:
    inputs:
      real_data_source:
        description: Source contract to validate for real-data compute
        required: true
        default: repo
        type: choice
        options: [repo, auto]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-data-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pyyaml

      - name: Validate inventories and YAML contracts
        run: |
          set -euo pipefail
          python3 tools/docs_inventory.py
          python3 tools/docs_inventory.py --check
          python3 tools/validate_real_cosmology_inputs_yml.py
          python3 tools/validate_real_dataset_variance_registry.py

      - name: Compute pipeline from committed real data
        env:
          REAL_DATA_SOURCE: ${{ github.event.inputs.real_data_source || 'repo' }}
        run: |
          set -euo pipefail
          python3 scripts/compute_rll_real_pipeline.py --output-dir artifacts/real-data-contract --real-data-dir data/real --data-source "$REAL_DATA_SOURCE"

      - name: Validate contract outputs
        run: |
          set -euo pipefail
          test -s artifacts/real-data-contract/MANIFEST.json
          test -s artifacts/real-data-contract/COMPUTE_REPORT.md
          test -s artifacts/real-data-contract/CHECKSUMS.sha256

      - name: Run focused tests
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_compute_rll_real_pipeline_contract.py tests/test_desi_dr2_bao_materialized.py tests/test_structure_d_robust_fit_matrix.py
          python -m pytest -q tests/test_import_raw_json_dataset_basic.py tests/test_import_raw_json_dataset_invalid.py tests/test_import_raw_json_dataset_rollback.py tests/test_import_raw_json_dataset_array.py

      - name: Upload real-data contract artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: real-data-contract-${{ github.run_id }}
          path: artifacts/real-data-contract/
          if-no-files-found: warn
          retention-days: 14

      - name: Finalize canonical real-data policy checksums
        if: always()
        run: |
          set -euo pipefail
          ARTIFACT_DIR="artifacts/workflow-policy/real-data-contract-ci/${{ github.job }}"
          mkdir -p "$ARTIFACT_DIR"
          . tools/ci/real_data_workflow_policy.sh
          rll_real_data_write_claim_boundary "$ARTIFACT_DIR"
          rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"
          rll_real_data_write_checksums "$ARTIFACT_DIR"

x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.

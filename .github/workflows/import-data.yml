# Auxiliary real-data workflow. Canonical policy: .github/workflows/real-data-complete-execution.yml
name: "Importar dados reais — guarded audit"

on:
  workflow_dispatch:
    inputs:
      standard_real_data_source:
        description: "Fonte real padrão para auditoria de importação"
        required: true
        default: desi_dr2_bao
        type: choice
        options:
          - custom
          - hz_cosmic_chronometers
          - desi_dr2_bao
          - pantheon_plus_shoes
          - planck_2018_cmb
          - fsigma8_growth
      real_data_url:
        description: "URL pública customizada; usada somente quando standard_real_data_source=custom"
        required: false
        default: ""
      output_name:
        description: Nome do artifact gerado
        required: false
        default: raw-data-audit-sample

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  import-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests pandas

      - name: Run synthetic detector as report-only guard
        run: |
          set -euo pipefail
          if [ -f scripts/detect_synthetic.py ]; then
            python scripts/detect_synthetic.py --report-only
          else
            echo "scripts/detect_synthetic.py not found; skipping report-only guard"
          fi

      - name: Resolve standard real-data URL
        env:
          STANDARD_REAL_DATA_SOURCE: ${{ github.event.inputs.standard_real_data_source }}
          CUSTOM_REAL_DATA_URL: ${{ github.event.inputs.real_data_url }}
        run: |
          set -euo pipefail
          case "$STANDARD_REAL_DATA_SOURCE" in
            custom)
              if [ -z "$CUSTOM_REAL_DATA_URL" ]; then
                echo "standard_real_data_source=custom requires real_data_url"
                exit 1
              fi
              RESOLVED_REAL_DATA_URL="$CUSTOM_REAL_DATA_URL"
              ;;
            hz_cosmic_chronometers)
              RESOLVED_REAL_DATA_URL="https://arxiv.org/abs/2205.05701"
              ;;
            desi_dr2_bao)
              RESOLVED_REAL_DATA_URL="https://arxiv.org/abs/2503.14738"
              ;;
            pantheon_plus_shoes)
              RESOLVED_REAL_DATA_URL="https://github.com/PantheonPlusSH0ES/DataRelease"
              ;;
            planck_2018_cmb)
              RESOLVED_REAL_DATA_URL="https://arxiv.org/abs/1808.05724"
              ;;
            fsigma8_growth)
              RESOLVED_REAL_DATA_URL="https://arxiv.org/abs/1204.4725"
              ;;
            *)
              echo "Unknown standard_real_data_source: $STANDARD_REAL_DATA_SOURCE"
              exit 1
              ;;
          esac
          echo "RESOLVED_REAL_DATA_SOURCE=$STANDARD_REAL_DATA_SOURCE" >> "$GITHUB_ENV"
          echo "RESOLVED_REAL_DATA_URL=$RESOLVED_REAL_DATA_URL" >> "$GITHUB_ENV"
          echo "Resolved real-data source: $STANDARD_REAL_DATA_SOURCE"
          echo "Resolved URL: $RESOLVED_REAL_DATA_URL"

      - name: Import explicit public data URL into audit workspace
        run: |
          set -euo pipefail
          mkdir -p _audit/raw
          python scripts/import_data.py --out _audit/raw/data.json --url "$RESOLVED_REAL_DATA_URL"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          p = Path('_audit/raw/data.json')
          payload = {
              'schema': 'rll.import_data_audit_manifest.v1',
              'standard_real_data_source': os.environ['RESOLVED_REAL_DATA_SOURCE'],
              'source_url': os.environ['RESOLVED_REAL_DATA_URL'],
              'artifact_path': str(p),
              'sha256': hashlib.sha256(p.read_bytes()).hexdigest(),
              'bytes': p.stat().st_size,
              'claim_boundary': 'Imported audit artifact only. This workflow does not commit data and does not validate RLL, dark matter, dark energy, or cosmology claims.',
          }
          Path('_audit/raw/import_manifest.json').write_text(json.dumps(payload, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Upload audit artifact without committing
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.event.inputs.output_name }}
          path: _audit/raw/
          if-no-files-found: warn
          retention-days: 14

      - name: Finalize canonical real-data policy checksums
        if: always()
        run: |
          set -euo pipefail
          ARTIFACT_DIR="artifacts/workflow-policy/import-data/${{ github.job }}"
          mkdir -p "$ARTIFACT_DIR"
          . tools/ci/real_data_workflow_policy.sh
          rll_real_data_write_claim_boundary "$ARTIFACT_DIR"
          rll_real_data_assert_boundary_file "$ARTIFACT_DIR/CLAIM_BOUNDARY.md"
          rll_real_data_write_checksums "$ARTIFACT_DIR"
    env:
      CANONICAL_REAL_DATA_WORKFLOW: .github/workflows/real-data-complete-execution.yml
      CLAIM_BOUNDARY: Auxiliary real-data workflow only; no RLL/cosmology/superiority claim and no synthetic, mock, fixture, demo, example, or placeholder promotion beyond explicit run checks.

x-canonical-real-data-policy: Auxiliary real-data workflow; canonical policy is .github/workflows/real-data-complete-execution.yml. Synthetic/mock/fixture/demo/example/placeholder inputs cannot be promoted as real observational evidence.
